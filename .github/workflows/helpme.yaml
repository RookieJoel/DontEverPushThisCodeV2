name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  security-events: write  # required to upload SARIF to GitHub Security tab
  actions: read

jobs:
    # GATE#0: Secret scanning (TruffleHog + Gitleaks)
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD
                extra_args: --only-verified

            # Gitleaks publishes SARIF directly to the GitHub Security tab
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
                GITLEAKS_ENABLE_SUMMARY: "true"

    # GATE#1a: SAST via SonarQube (results in Sonar dashboard)
    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # GATE#1b: SAST via CodeQL (results in GitHub Security tab)
    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                language: [ 'javascript-typescript' ]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    # GATE#2: Dependency scanning via OWASP Dependency-Check (SARIF + HTML)
    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            - name: Install dependencies
              run: npm install

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                format: 'SARIF'
                out: 'reports'
                args: >
                    --failOnCVSS 7
                    --enableRetired

            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: reports/dependency-check-report.sarif
                category: dependency-check

            - name: Upload Depcheck report artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    # GATE#3: Container/Image scanning via Trivy (SARIF + artifact)
    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan (SARIF)
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'HIGH,CRITICAL'
                ignore-unfixed: true

            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            - name: Upload Trivy report artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-report
                path: trivy-results.sarif

    # GATE#4: IaC scanning — skipped per course
    # GATE#5: DAST — separate workshop
